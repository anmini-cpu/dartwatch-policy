<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DartWatch - 문의하기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f9; color: #1a1a1a; }
    .container { max-width: 720px; margin: 0 auto; padding: 48px 24px; }
    h1 { font-size: 24px; font-weight: 700; color: #0F2952; margin-bottom: 12px; }
    .desc { font-size: 15px; color: #555; line-height: 1.8; margin-bottom: 32px; }
    .email-box { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 24px; }
    .email-label { font-size: 12px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .email-addr { font-size: 15px; color: #1a1a1a; }
    .note { font-size: 13px; color: #888; margin-top: 32px; line-height: 1.8; }
    .company { font-size: 13px; color: #666; margin-top: 40px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
  </style>
</head>
<body>
<div class="container">
  <h1>문의하기</h1>
  <p class="desc">서비스 이용 중 불편한 점이나 궁금한 사항이 있으시면 아래 이메일로 문의해 주세요. 빠른 시일 내에 답변드리겠습니다.</p>

  <div class="email-box">
    <div class="email-label">이메일</div>
    <div class="email-addr">wisetapkr@gmail.com</div>
  </div>

  <p class="note">
    · 문의 시 앱 버전과 기기 정보를 함께 알려주시면 더 빠른 답변이 가능합니다.<br>
    · 자주 묻는 질문은 FAQ에서 먼저 확인해 보세요.
  </p>

  <div class="company">
    서비스 제공자: (주)와이즈탭코리아 · wisetapkr@gmail.com
  </div>
</div>
</body>
</html>
