<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DartWatch - 공지사항</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f9; color: #1a1a1a; }
    .container { max-width: 720px; margin: 0 auto; padding: 48px 24px; }
    .brand { font-size: 22px; font-weight: 800; color: #0F2952; letter-spacing: 1px; margin-bottom: 8px; }
    .brand span { font-size: 13px; font-weight: 400; color: #666; margin-left: 8px; }
    nav { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #e0e0e0; }
    nav a { font-size: 14px; color: #0F2952; text-decoration: none; margin-right: 20px; font-weight: 500; }
    nav a:hover { text-decoration: underline; }
    h1 { font-size: 24px; font-weight: 700; color: #0F2952; margin-bottom: 32px; }
    .notice-item { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 24px; margin-bottom: 16px; }
    .notice-date { font-size: 12px; color: #999; margin-bottom: 8px; }
    .notice-title { font-size: 16px; font-weight: 700; color: #0F2952; margin-bottom: 10px; }
    .notice-body { font-size: 14px; line-height: 1.8; color: #444; }
    .badge { display: inline-block; font-size: 11px; font-weight: 700; background: #0F2952; color: #fff; border-radius: 4px; padding: 2px 8px; margin-right: 8px; vertical-align: middle; }
    .empty { font-size: 14px; color: #999; text-align: center; padding: 60px 0; }
    .company { font-size: 13px; color: #666; margin-top: 40px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
  </style>
</head>
<body>
<div class="container">

  <h1>공지사항</h1>

  <div class="notice-item">
    <div class="notice-date">2026.05.24</div>
    <div class="notice-title"><span class="badge">업데이트</span>버전 1.0 출시</div>
    <div class="notice-body">
      다트워치 공시 푸쉬알림 서비스를 시작합니다.<br><br>
      · DART 공시 실시간 알림 (코스피/코스닥)<br>
      · KRX 시장조치 알림<br>
      · 관심 종목 및 공시 유형별 구독 설정<br>
      · 공시 검색 (회사명 + 공시 유형 키워드)<br>
      · 프리미엄: 공시 핵심 요약 제공, 무제한 관심 종목, 최근 1년 공시 검색<br><br>
      서비스 이용 중 불편한 점은 wisetapkr@gmail.com으로 문의해 주세요.
    </div>
  </div>

  <div class="company">
    서비스 제공자: (주)와이즈탭코리아 · wisetapkr@gmail.com
  </div>
</div>
</body>
</html>
